<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шуточный Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        button { padding: 15px; margin: 10px; width: 90%; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    </style>
</head>
<body>
    <h1>😂 Шутки от бота!</h1>
    <button id="jokeBtn">Сказать шутку</button>
    <button id="closeBtn">Закрыть</button>

    <script>
        const webApp = window.Telegram.WebApp;
        webApp.ready();           // убираем загрузочный экран
        webApp.expand();          // растягиваем на всю высоту

        // Кнопка "Сказать шутку"
        document.getElementById('jokeBtn').addEventListener('click', () => {
            webApp.sendData('joke');   // отправляем строку в бот
        });

        // Кнопка закрытия
        document.getElementById('closeBtn').addEventListener('click', () => {
            webApp.close();
        });

        // Пример: можно реагировать на тему Telegram
        console.log('Тема:', webApp.themeParams);
    </script>
</body>
</html>
